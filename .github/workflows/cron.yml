name: Cron

on:
  schedule:
    - cron: '0 */4 * * *'
    - cron: '*/10 * * * *'
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync:
    if: github.event.schedule == '0 */4 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger job sync
        env:
          CLOUD_RUN_URL: ${{ secrets.CLOUD_RUN_URL }}
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Cron-Secret: $CRON_SHARED_SECRET" \
            "$CLOUD_RUN_URL/internal/cron/sync")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body"
          [ "$code" -lt 400 ] || exit 1

  generation-queue:
    if: github.event.schedule == '*/10 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger generation queue
        env:
          CLOUD_RUN_URL: ${{ secrets.CLOUD_RUN_URL }}
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Cron-Secret: $CRON_SHARED_SECRET" \
            "$CLOUD_RUN_URL/internal/cron/generation-queue")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body"
          [ "$code" -lt 400 ] || exit 1

  maintenance:
    if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily maintenance
        env:
          CLOUD_RUN_URL: ${{ secrets.CLOUD_RUN_URL }}
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Cron-Secret: $CRON_SHARED_SECRET" \
            "$CLOUD_RUN_URL/internal/cron/maintenance")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body"
          [ "$code" -lt 400 ] || exit 1

  # When any scheduled cron job fails, open (or bump) a single tracking issue
  # so recurring failures don't sit unnoticed in the Actions tab. GitHub's
  # default workflow-failure email is easy to miss; a pinned issue is not.
  #
  # Why this matters: on 2026-04-22 the generation-queue cron failed every
  # 10 minutes for ~3 hours (prod schema drift, commit 28e5ce5) before the
  # operator noticed. This step makes that lag minutes, not hours.
  alert-on-failure:
    needs: [sync, generation-queue, maintenance]
    if: always() && (needs.sync.result == 'failure' || needs.generation-queue.result == 'failure' || needs.maintenance.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or bump "cron failing" issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILED_JOBS: "sync=${{ needs.sync.result }} generation-queue=${{ needs.generation-queue.result }} maintenance=${{ needs.maintenance.result }}"
        run: |
          set -euo pipefail
          title="[cron] scheduled job failing"
          # gh issue list --search respects the exact title via "in:title"
          existing=$(gh issue list --repo "$REPO" --state open --search "$title in:title" --json number --jq '.[0].number' || echo "")
          body="Cron run failed: $RUN_URL
          Job results: $FAILED_JOBS

          First step in triage: check prod logs for 5xx from /internal/cron/* endpoints and reconcile prod schema vs deployed code (see commit 28e5ce5 for the canonical drift case)."
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "$body"
          else
            gh issue create --repo "$REPO" --title "$title" \
              --label "incident,cron" \
              --body "$body" || \
            gh issue create --repo "$REPO" --title "$title" --body "$body"
          fi
