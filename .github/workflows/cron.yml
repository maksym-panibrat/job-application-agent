name: Cron

on:
  schedule:
    - cron: '0 */6 * * *'      # bulk-enqueue stale slugs
    - cron: '*/10 * * * *'     # generation queue (existing)
    - cron: '0 3 * * *'        # daily maintenance (existing)
    - cron: '*/5 * * * *'      # process sync + match queues
  workflow_dispatch:

jobs:
  sync:
    if: github.event.schedule == '0 */6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger job sync
        env:
          CLOUD_RUN_URL: ${{ secrets.CLOUD_RUN_URL }}
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Cron-Secret: $CRON_SHARED_SECRET" \
            "$CLOUD_RUN_URL/internal/cron/sync")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body"
          [ "$code" -lt 400 ] || exit 1

  generation-queue:
    if: github.event.schedule == '*/10 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger generation queue
        env:
          CLOUD_RUN_URL: ${{ secrets.CLOUD_RUN_URL }}
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Cron-Secret: $CRON_SHARED_SECRET" \
            "$CLOUD_RUN_URL/internal/cron/generation-queue")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body"
          [ "$code" -lt 400 ] || exit 1

  maintenance:
    if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily maintenance
        env:
          CLOUD_RUN_URL: ${{ secrets.CLOUD_RUN_URL }}
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Cron-Secret: $CRON_SHARED_SECRET" \
            "$CLOUD_RUN_URL/internal/cron/maintenance")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body"
          [ "$code" -lt 400 ] || exit 1

  process-sync-queue:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync queue drain
        env:
          CLOUD_RUN_URL: ${{ secrets.CLOUD_RUN_URL }}
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Cron-Secret: $CRON_SHARED_SECRET" \
            "$CLOUD_RUN_URL/internal/cron/process-sync-queue")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body"
          [ "$code" -lt 400 ] || exit 1

  process-match-queue:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger match queue drain
        env:
          CLOUD_RUN_URL: ${{ secrets.CLOUD_RUN_URL }}
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Cron-Secret: $CRON_SHARED_SECRET" \
            "$CLOUD_RUN_URL/internal/cron/process-match-queue")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body"
          [ "$code" -lt 400 ] || exit 1

  # When any scheduled cron job fails, open (or bump) a single tracking issue
  # so recurring failures don't sit unnoticed in the Actions tab. GitHub's
  # default workflow-failure email is easy to miss; a pinned issue is not.
  #
  # Why this matters: on 2026-04-22 the generation-queue cron failed every
  # 10 minutes for ~3 hours (prod schema drift, commit 28e5ce5) before the
  # operator noticed. This step makes that lag minutes, not hours.
  alert-on-failure:
    needs: [sync, generation-queue, maintenance, process-sync-queue, process-match-queue]
    if: always() && (needs.sync.result == 'failure' || needs.generation-queue.result == 'failure' || needs.maintenance.result == 'failure' || needs.process-sync-queue.result == 'failure' || needs.process-match-queue.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or bump "cron failing" issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILED_JOBS: "sync=${{ needs.sync.result }} generation-queue=${{ needs.generation-queue.result }} maintenance=${{ needs.maintenance.result }} process-sync-queue=${{ needs.process-sync-queue.result }} process-match-queue=${{ needs.process-match-queue.result }}"
        run: |
          set -euo pipefail
          title="[cron] scheduled job failing"
          # Search across BOTH open and closed issues so the persistent
          # tracking-issue identity survives a `closes #N` keyword on a
          # fix PR (#78). Without --state all, every cron-fix PR that
          # closes the tracker would orphan it and force a new issue
          # number on the next failure (#70 → #72 churn observed
          # 2026-05-04). Prefer OPEN; fall back to most-recently-closed.
          # If found-but-closed, reopen and comment.
          existing=$(gh issue list --repo "$REPO" --state all --search "$title in:title" \
            --json number,state,closedAt --limit 20 \
            --jq '([.[] | select(.state == "OPEN")] + ([.[] | select(.state == "CLOSED")] | sort_by(.closedAt) | reverse))[0] // empty' \
            || echo "")
          body="Cron run failed: $RUN_URL
          Job results: $FAILED_JOBS

          First step in triage: check prod logs for 5xx from /internal/cron/* endpoints and reconcile prod schema vs deployed code (see commit 28e5ce5 for the canonical drift case)."
          if [ -n "$existing" ]; then
            num=$(echo "$existing" | jq -r '.number')
            state=$(echo "$existing" | jq -r '.state')
            if [ "$state" = "CLOSED" ]; then
              gh issue reopen "$num" --repo "$REPO" \
                --comment "Reopened by alert-on-failure: a new cron run failed after this issue was closed."
            fi
            gh issue comment "$num" --repo "$REPO" --body "$body"
          else
            gh issue create --repo "$REPO" --title "$title" \
              --label "incident,cron" \
              --body "$body" || \
            gh issue create --repo "$REPO" --title "$title" --body "$body"
          fi
