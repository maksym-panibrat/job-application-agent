name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check app/ tests/
      - name: Unit tests
        run: uv run pytest tests/unit/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          ANTHROPIC_API_KEY: test-key
      - name: Integration + E2E tests
        run: uv run pytest tests/integration/ tests/e2e/ -v
        env:
          ANTHROPIC_API_KEY: test-key

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Test
        run: cd frontend && npm run test
      - name: Build
        run: cd frontend && npm run build

  e2e-browser:
    runs-on: ubuntu-latest
    needs: [test, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jobagent
          POSTGRES_USER: jobagent
          POSTGRES_PASSWORD: jobagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python dependencies
        run: uv sync --dev
      - name: Run database migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://jobagent:jobagent@localhost:5432/jobagent
          ANTHROPIC_API_KEY: test-key
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd frontend && npx playwright install-deps chromium
      - name: Run Playwright E2E tests
        run: cd frontend && npm run test:e2e
        env:
          CI: 'true'
          DATABASE_URL: postgresql+asyncpg://jobagent:jobagent@localhost:5432/jobagent
          ANTHROPIC_API_KEY: test-key
          ANTHROPIC_BASE_URL: http://localhost:9000
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
