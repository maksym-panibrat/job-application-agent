name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check app/ tests/
      - name: Unit tests
        run: uv run pytest tests/unit/ -v --cov=app --cov-report=term --cov-fail-under=56
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          GOOGLE_API_KEY: fake-test-key
          ENVIRONMENT: test
      - name: Integration + E2E tests
        run: uv run pytest tests/integration/ tests/e2e/ -v --cov=app --cov-append --cov-report=term
        env:
          GOOGLE_API_KEY: fake-test-key
          ENVIRONMENT: test
          ADZUNA_APP_ID: fake-app-id
          ADZUNA_API_KEY: fake-api-key
          JSEARCH_API_KEY: fake-jsearch-key

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Test
        run: cd frontend && npm run test -- --coverage --coverage.thresholds.lines=29
      - name: Build
        run: cd frontend && npm run build

  e2e-browser:
    runs-on: ubuntu-latest
    needs: [test, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jobagent
          POSTGRES_USER: jobagent
          POSTGRES_PASSWORD: jobagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python dependencies
        run: uv sync --dev
      - name: Run database migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://jobagent:jobagent@localhost:5432/jobagent
          GOOGLE_API_KEY: fake-test-key
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd frontend && npx playwright install-deps chromium
      - name: Run Playwright E2E tests
        run: cd frontend && npm run test:e2e
        env:
          CI: 'true'
          DATABASE_URL: postgresql+asyncpg://jobagent:jobagent@localhost:5432/jobagent
          GOOGLE_API_KEY: fake-test-key
          ENVIRONMENT: test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: [test, frontend, e2e-browser]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/app/api:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/app/api:latest \
            .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/app/api:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/app/api:latest

      - name: Run migrations
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/app/api:${{ github.sha }}"
          SA="${{ secrets.GCP_SERVICE_ACCOUNT }}"
          if gcloud run jobs describe alembic-migrate --region us-central1 &>/dev/null; then
            gcloud run jobs update alembic-migrate --image "$IMAGE" --region us-central1 \
              --command="/app/.venv/bin/alembic,upgrade,head" \
              --service-account="$SA"
          else
            gcloud run jobs create alembic-migrate \
              --image "$IMAGE" --region us-central1 \
              --command="/app/.venv/bin/alembic,upgrade,head" \
              --set-secrets="DATABASE_URL=database-url:latest" \
              --service-account="$SA"
          fi
          gcloud run jobs execute alembic-migrate --region us-central1 --wait

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy api \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/app/api:${{ github.sha }} \
            --region us-central1 \
            --set-secrets="GOOGLE_API_KEY=google-api-key:latest,ADZUNA_APP_ID=adzuna-app-id:latest,ADZUNA_API_KEY=adzuna-api-key:latest,DATABASE_URL=database-url:latest,CRON_SHARED_SECRET=cron-shared-secret:latest,JWT_SECRET=jwt-secret:latest,GOOGLE_OAUTH_CLIENT_ID=google-oauth-client-id:latest,GOOGLE_OAUTH_CLIENT_SECRET=google-oauth-client-secret:latest" \
            --set-env-vars="ENVIRONMENT=production,AUTH_ENABLED=true" \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --min-instances=0 \
            --max-instances=1 \
            --allow-unauthenticated \
            --port=8000

      - name: Get Cloud Run URL
        id: url
        run: |
          URL=$(gcloud run services describe api --region us-central1 \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
