name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check app/ tests/
      - name: Unit tests
        run: uv run pytest tests/unit/ -v --cov=app --cov-report=term --cov-fail-under=39
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          GOOGLE_API_KEY: fake-test-key
          ENVIRONMENT: test
      - name: Integration + E2E tests
        run: uv run pytest tests/integration/ tests/e2e/ -v --cov=app --cov-append --cov-report=term --cov-fail-under=56
        env:
          GOOGLE_API_KEY: fake-test-key
          ENVIRONMENT: test
          ADZUNA_APP_ID: fake-app-id
          ADZUNA_API_KEY: fake-api-key
          JSEARCH_API_KEY: fake-jsearch-key

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Test
        run: cd frontend && npm run test -- --coverage --coverage.thresholds.lines=29
      - name: Build
        run: cd frontend && npm run build

  e2e-browser:
    runs-on: ubuntu-latest
    needs: [test, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jobagent
          POSTGRES_USER: jobagent
          POSTGRES_PASSWORD: jobagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python dependencies
        run: uv sync --dev
      - name: Run database migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://jobagent:jobagent@localhost:5432/jobagent
          GOOGLE_API_KEY: fake-test-key
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd frontend && npx playwright install-deps chromium
      - name: Run Playwright E2E tests
        run: cd frontend && npm run test:e2e
        env:
          CI: 'true'
          DATABASE_URL: postgresql+asyncpg://jobagent:jobagent@localhost:5432/jobagent
          GOOGLE_API_KEY: fake-test-key
          ENVIRONMENT: test
      - uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  build-and-push:
    # Build + push to GHCR, then dispatch a bump into panibrat-infra.
    # Replaces the old GCP path (migrate → Cloud Run deploy → smoke against Cloud Run URL).
    # Alembic migrations now happen on the box (Phase B will add the dedicated
    # alembic-upgrade compose service; for Phase A the existing in-app behavior
    # — migrations run during local dev only, prod migrations stay manual until
    # Phase B — is preserved).
    runs-on: ubuntu-latest
    needs: [test, frontend, e2e-browser]
    # main push for normal flow; workflow_dispatch lets us bootstrap a GHCR
    # image from a feature branch without merging the cutover PR.
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        run: |
          SHA=${{ github.sha }}
          docker build -t ghcr.io/maksym-panibrat/job-application-agent:$SHA -t ghcr.io/maksym-panibrat/job-application-agent:main .
          docker push ghcr.io/maksym-panibrat/job-application-agent:$SHA
          docker push ghcr.io/maksym-panibrat/job-application-agent:main
      - name: Dispatch bump to panibrat-infra
        env:
          GH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          gh api repos/maksym-panibrat/panibrat-infra/dispatches \
            -f event_type=bump-app-image \
            -F "client_payload[app]=job-search" \
            -F "client_payload[sha]=${{ github.sha }}"
