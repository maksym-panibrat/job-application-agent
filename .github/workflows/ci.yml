name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check app/ tests/
      - name: Unit tests
        run: uv run pytest tests/unit/ -v --cov=app --cov-report=term --cov-fail-under=39
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          GOOGLE_API_KEY: fake-test-key
          ENVIRONMENT: test
      - name: Integration + E2E tests
        run: uv run pytest tests/integration/ tests/e2e/ -v --cov=app --cov-append --cov-report=term --cov-fail-under=56
        env:
          GOOGLE_API_KEY: fake-test-key
          ENVIRONMENT: test
          ADZUNA_APP_ID: fake-app-id
          ADZUNA_API_KEY: fake-api-key
          JSEARCH_API_KEY: fake-jsearch-key

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Test
        run: cd frontend && npm run test -- --coverage --coverage.thresholds.lines=29
      - name: Build
        run: cd frontend && npm run build

  e2e-browser:
    runs-on: ubuntu-latest
    needs: [test, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jobagent
          POSTGRES_USER: jobagent
          POSTGRES_PASSWORD: jobagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8
        with:
          version: "latest"
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python dependencies
        run: uv sync --dev
      - name: Run database migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://jobagent:jobagent@localhost:5432/jobagent
          GOOGLE_API_KEY: fake-test-key
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd frontend && npx playwright install-deps chromium
      - name: Run Playwright E2E tests
        run: cd frontend && npm run test:e2e
        env:
          CI: 'true'
          DATABASE_URL: postgresql+asyncpg://jobagent:jobagent@localhost:5432/jobagent
          GOOGLE_API_KEY: fake-test-key
          ENVIRONMENT: test
      - uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  migrate:
    # Build+push image and run Alembic as a Cloud Run Job. Must pass before deploy —
    # a broken migration on an already-deployed API is worse than a blocked deploy.
    runs-on: ubuntu-latest
    needs: [test, frontend, e2e-browser]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/app/api:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/app/api:latest \
            .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/app/api:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/app/api:latest

      - name: Run Alembic migrations
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/app/api:${{ github.sha }}"
          SA="${{ secrets.GCP_SERVICE_ACCOUNT }}"
          if gcloud run jobs describe alembic-migrate --region us-central1 &>/dev/null; then
            gcloud run jobs update alembic-migrate --image "$IMAGE" --region us-central1 \
              --command="/app/.venv/bin/alembic,upgrade,head" \
              --service-account="$SA"
          else
            gcloud run jobs create alembic-migrate \
              --image "$IMAGE" --region us-central1 \
              --command="/app/.venv/bin/alembic,upgrade,head" \
              --set-secrets="DATABASE_URL=database-url:latest" \
              --service-account="$SA"
          fi
          gcloud run jobs execute alembic-migrate --region us-central1 --wait

  deploy:
    runs-on: ubuntu-latest
    needs: [migrate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build --set-secrets from secrets that actually exist
        id: secrets
        run: |
          # Required secrets — deploy fails loud if missing (app can't start without these).
          REQUIRED=(
            "GOOGLE_API_KEY=google-api-key"
            "ADZUNA_APP_ID=adzuna-app-id"
            "ADZUNA_API_KEY=adzuna-api-key"
            "DATABASE_URL=database-url"
            "CRON_SHARED_SECRET=cron-shared-secret"
            "JWT_SECRET=jwt-secret"
          )
          # Optional secrets — included only when present in Secret Manager.
          # Keeps deploys from hard-failing when OAuth isn't provisioned yet;
          # the app only mounts the OAuth router when both secrets are set.
          OPTIONAL=(
            "GOOGLE_OAUTH_CLIENT_ID=google-oauth-client-id"
            "GOOGLE_OAUTH_CLIENT_SECRET=google-oauth-client-secret"
          )
          PAIRS=()
          for entry in "${REQUIRED[@]}"; do
            PAIRS+=("${entry}:latest")
          done
          for entry in "${OPTIONAL[@]}"; do
            secret_name="${entry#*=}"
            # Capture stderr so we can distinguish "NotFound" (secret absent)
            # from "PermissionDenied" (IAM miss on the CI service account).
            # The old silent-skip hid both behind the same message.
            if err=$(gcloud secrets describe "$secret_name" --quiet 2>&1 >/dev/null); then
              PAIRS+=("${entry}:latest")
              echo "included optional secret: $secret_name"
            else
              echo "skipped optional secret: $secret_name"
              echo "  gcloud stderr: ${err:0:500}"
            fi
          done
          joined=$(IFS=','; echo "${PAIRS[*]}")
          echo "secrets=$joined" >> "$GITHUB_OUTPUT"
          # AUTH_ENABLED needs to reflect OAuth availability — off when its secrets aren't present.
          if [[ "$joined" == *"GOOGLE_OAUTH_CLIENT_ID"* ]]; then
            echo "auth_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "auth_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Cloud Run service URL (pre-deploy)
        id: pre_url
        # Cloud Run service URLs are stable per service, so we can fetch the URL
        # from the existing revision and pass it back in as PUBLIC_BASE_URL so the
        # OAuth router builds an absolute redirect_uri Google will accept.
        run: |
          URL=$(gcloud run services describe api --region us-central1 \
            --format="value(status.url)" 2>/dev/null || echo "")
          if [ -z "$URL" ]; then
            echo "No existing service URL — first deploy. PUBLIC_BASE_URL will be empty"
            echo "and the prod-secrets validator will fail; set the URL manually after"
            echo "the first revision lands and re-run." >&2
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy api \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/app/api:${{ github.sha }} \
            --region us-central1 \
            --set-secrets="${{ steps.secrets.outputs.secrets }}" \
            --set-env-vars="ENVIRONMENT=production,AUTH_ENABLED=${{ steps.secrets.outputs.auth_enabled }},PUBLIC_BASE_URL=${{ steps.pre_url.outputs.url }}" \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --min-instances=0 \
            --max-instances=1 \
            --allow-unauthenticated \
            --port=8000

      - name: Get Cloud Run URL
        id: url
        run: |
          URL=$(gcloud run services describe api --region us-central1 \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

  smoke-prod:
    # Runs scripts/smoke/golden_path.py against the just-deployed Cloud Run URL.
    # Deliberate break in prod code → this job goes red → CI badge on main turns red.
    # 60s warmup gives Cloud Run time to promote the new revision and wake a cold instance.
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8
        with:
          version: "latest"

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Resolve Cloud Run URL
        id: url
        run: |
          URL=$(gcloud run services describe api --region us-central1 \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Warm up Cloud Run (60s)
        run: |
          echo "Waiting 60s for new revision to promote and cold-start..."
          sleep 60

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Fetch cron secret from Secret Manager
        id: cron_secret
        run: |
          SECRET=$(gcloud secrets versions access latest --secret=cron-shared-secret)
          echo "::add-mask::$SECRET"
          echo "value=$SECRET" >> $GITHUB_OUTPUT

      - name: Run golden-path smoke
        env:
          SMOKE_BASE_URL: ${{ steps.url.outputs.url }}
          SMOKE_BEARER_TOKEN: ${{ secrets.SMOKE_BEARER_TOKEN }}
          SMOKE_CRON_SECRET: ${{ steps.cron_secret.outputs.value }}
        run: uv run python scripts/smoke/golden_path.py --verbose
