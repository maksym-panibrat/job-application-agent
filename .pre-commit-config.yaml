repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: true
      - id: unit-tests
        name: unit tests (pre-push)
        entry: uv run pytest tests/unit -x -q
        language: system
        pass_filenames: false
        stages: [pre-push]
