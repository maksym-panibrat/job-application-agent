repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check app/ tests/
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: true
      - id: tsc
        name: typescript check
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx)$
      - id: unit-tests
        name: unit tests (pre-push)
        entry: uv run pytest tests/unit -x -q
        language: system
        pass_filenames: false
        stages: [pre-push]
